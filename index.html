<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Folio">
<title>Folio — Your Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede7d9;
    --accent: #8b4513;
    --accent-light: #c4703a;
    --muted: #9a8e7d;
    --border: #d4c9b5;
    --card-bg: #faf7f2;
    --shadow: 0 4px 24px rgba(26,18,8,0.10);
    --radius: 12px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Crimson Pro', Georgia, serif;
    --reader-font-size: 19px;
    --reader-line-height: 1.85;
    --reader-width: 680px;
  }
  .theme-dark {
    --ink: #e8dfc8;
    --paper: #1a1610;
    --cream: #221e18;
    --accent: #c4843a;
    --accent-light: #e09a55;
    --muted: #7a7060;
    --border: #3a3328;
    --card-bg: #211d17;
    --shadow: 0 4px 24px rgba(0,0,0,0.40);
  }
  .theme-sepia {
    --ink: #3b2a1a;
    --paper: #f2e8d5;
    --cream: #e8dac4;
    --accent: #7a4010;
    --accent-light: #a05828;
    --muted: #8a7560;
    --border: #c8b898;
    --card-bg: #f7f0e2;
    --shadow: 0 4px 24px rgba(59,42,26,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overscroll-behavior: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── LIBRARY ── */
  #library-screen { background: var(--paper); }

  .lib-header {
    padding: 56px 24px 24px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px);
  }
  .lib-header h1 {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .lib-header .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    font-style: italic;
  }
  .lib-toolbar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #lib-search {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #lib-search:focus { border-color: var(--accent); }
  #lib-search::placeholder { color: var(--muted); }

  .btn-icon {
    width: 42px; height: 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--accent); background: var(--cream); }

  .lib-content { flex: 1; padding: 20px 24px 100px; overflow-y: auto; }

  .shelf-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
  }
  .shelf-label:first-child { margin-top: 0; }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  .book-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
  }
  .book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--accent); }
  .book-card:active { transform: translateY(0); }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--cream);
  }
  .book-cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--cream) 0%, var(--border) 100%);
    padding: 12px;
    text-align: center;
  }
  .book-cover-placeholder .spine-title {
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    word-break: break-word;
  }
  .book-cover-placeholder .spine-author {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }
  .book-info {
    padding: 10px 10px 12px;
  }
  .book-title {
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .book-author {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
  }
  .book-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s;
  }
  .book-delete {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(26,18,8,0.55);
    color: #fff;
    display: none;
    align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    border: none;
  }
  .book-card:hover .book-delete { display: flex; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
  .empty-state h3 { font-family: var(--font-display); font-size: 1.3rem; color: var(--ink); margin-bottom: 8px; }
  .empty-state p { font-size: 0.95rem; line-height: 1.6; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px; right: 24px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(139,69,19,0.35);
    transition: background 0.2s, transform 0.2s;
    z-index: 20;
  }
  .fab:hover { background: var(--accent-light); transform: scale(1.07); }
  .fab:active { transform: scale(0.96); }

  #file-input { display: none; }

  /* Theme toggle */
  .theme-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .theme-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .theme-dot:hover, .theme-dot.active { border-color: var(--accent); transform: scale(1.15); }
  .theme-dot.light { background: #f5f0e8; }
  .theme-dot.sepia { background: #f2e8d5; }
  .theme-dot.dark { background: #1a1610; }

  /* ── READER ── */
  #reader-screen {
    background: var(--paper);
    flex-direction: column;
  }

  .reader-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px);
  }
  .reader-topbar .back-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .reader-topbar .back-btn:hover { background: var(--cream); }
  .reader-book-title {
    flex: 1;
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reader-actions { display: flex; gap: 8px; }

  /* Reader controls panel */
  .reader-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1.5px solid var(--border);
    padding: 16px 20px 32px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 30;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 32px rgba(26,18,8,0.12);
  }
  .reader-controls.open { transform: translateY(0); }
  .controls-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .ctrl-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
  }
  .ctrl-slider {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
    cursor: pointer;
  }
  .ctrl-value {
    font-size: 0.85rem;
    color: var(--ink);
    width: 36px;
    text-align: right;
  }
  .ctrl-themes {
    display: flex;
    gap: 10px;
    flex: 1;
  }
  .ctrl-theme-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
  }
  .ctrl-theme-btn.active { border-color: var(--accent); background: var(--cream); }

  /* Table of contents panel */
  .toc-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--paper);
    z-index: 40;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 56px 24px 40px;
  }
  .toc-panel.open { transform: translateX(0); }
  .toc-panel h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .toc-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .toc-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 1rem;
    color: var(--ink);
    transition: color 0.2s;
    line-height: 1.4;
  }
  .toc-item:hover { color: var(--accent); }
  .toc-item.depth-2 { padding-left: 16px; font-size: 0.9rem; color: var(--muted); }
  .toc-item.depth-3 { padding-left: 32px; font-size: 0.85rem; color: var(--muted); }

  /* Search panel */
  .search-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--paper);
    z-index: 40;
    transform: translateY(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    padding: 56px 20px 20px;
    display: flex;
    flex-direction: column;
  }
  .search-panel.open { transform: translateY(0); }
  .search-panel h2 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    margin-bottom: 16px;
  }
  .search-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-input-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #reader-search-input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 1.05rem;
    outline: none;
  }
  #reader-search-input:focus { border-color: var(--accent); }
  .search-results { flex: 1; overflow-y: auto; }
  .search-result-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .search-result-item:hover { opacity: 0.7; }
  .search-result-chapter {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .search-result-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--ink);
  }
  .search-result-text mark {
    background: rgba(139,69,19,0.2);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 2px;
  }
  .search-panel-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .search-no-results {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-style: italic;
  }

  /* Reader content */
  .reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 32px 20px 120px;
    -webkit-overflow-scrolling: touch;
  }
  #reader-content {
    max-width: var(--reader-width);
    margin: 0 auto;
    font-family: var(--font-body);
    font-size: var(--reader-font-size);
    line-height: var(--reader-line-height);
    color: var(--ink);
  }
  #reader-content h1, #reader-content h2, #reader-content h3,
  #reader-content h4, #reader-content h5, #reader-content h6 {
    font-family: var(--font-display);
    color: var(--ink);
    margin: 1.8em 0 0.8em;
    line-height: 1.3;
  }
  #reader-content h1 { font-size: 1.7em; }
  #reader-content h2 { font-size: 1.35em; }
  #reader-content h3 { font-size: 1.15em; }
  #reader-content p { margin-bottom: 1em; text-align: justify; hyphens: auto; }
  #reader-content p + p { text-indent: 1.5em; }
  #reader-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1em 0; display: block; }
  #reader-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  #reader-content blockquote {
    border-left: 3px solid var(--accent);
    margin: 1.5em 0;
    padding: 0.5em 0 0.5em 1.2em;
    font-style: italic;
    color: var(--muted);
  }
  #reader-content table { width: 100%; border-collapse: collapse; margin: 1em 0; }
  #reader-content th, #reader-content td { border: 1px solid var(--border); padding: 8px; font-size: 0.9em; }
  #reader-content th { background: var(--cream); font-family: var(--font-display); }

  /* Chapter nav */
  .chapter-nav {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 10px;
    box-shadow: var(--shadow);
    z-index: 20;
    transition: opacity 0.3s;
  }
  .chapter-nav button {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    font-size: 16px;
  }
  .chapter-nav button:hover { background: var(--cream); }
  .chapter-nav button:disabled { opacity: 0.3; cursor: default; }
  .chapter-info {
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0 6px;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  /* Progress bar (reader) */
  .reading-progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: var(--accent);
    z-index: 100;
    transition: width 0.1s;
    pointer-events: none;
  }

  /* Overlay backdrop */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(26,18,8,0.35);
    z-index: 25;
    display: none;
    backdrop-filter: blur(2px);
  }
  .backdrop.visible { display: block; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 300;
    display: none;
  }
  .loading-overlay.visible { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-style: italic; color: var(--muted); }

  @media (min-width: 600px) {
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .reader-body { padding: 48px 32px 120px; }
  }
  @media (min-width: 900px) {
    .lib-header { padding: 40px 40px 24px; }
    .lib-content { padding: 24px 40px 100px; }
    .reader-body { padding: 48px 40px 120px; }
    :root { --reader-font-size: 20px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>Opening book…</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══ LIBRARY SCREEN ══ -->
<div class="screen active" id="library-screen">
  <div class="lib-header">
    <h1>Folio</h1>
    <div class="subtitle">Your personal library</div>
    <div class="lib-toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="lib-search" placeholder="Search your library…" autocomplete="off">
      </div>
      <div class="theme-bar">
        <div class="theme-dot light active" data-theme="light" title="Light"></div>
        <div class="theme-dot sepia" data-theme="sepia" title="Sepia"></div>
        <div class="theme-dot dark" data-theme="dark" title="Dark"></div>
      </div>
    </div>
  </div>

  <div class="lib-content" id="lib-content">
    <div class="empty-state" id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h3>Your shelf is empty</h3>
      <p>Tap the <strong>+</strong> button below to add<br>your EPUB books.</p>
    </div>
    <div id="book-grid" class="book-grid" style="display:none;"></div>
  </div>

  <input type="file" id="file-input" accept=".epub" multiple>
  <button class="fab" id="add-btn" title="Add books">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- ══ READER SCREEN ══ -->
<div class="screen" id="reader-screen">
  <div class="reading-progress" id="reading-progress"></div>

  <div class="reader-topbar">
    <button class="back-btn" id="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="reader-book-title" id="reader-title">—</div>
    <div class="reader-actions">
      <button class="btn-icon" id="toc-btn" title="Contents">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      </button>
      <button class="btn-icon" id="reader-search-btn" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="btn-icon" id="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
    </div>
  </div>

  <div class="reader-body" id="reader-body">
    <div id="reader-content"></div>
  </div>

  <div class="chapter-nav" id="chapter-nav">
    <button id="prev-ch" title="Previous chapter">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="chapter-info" id="chapter-info">—</span>
    <button id="next-ch" title="Next chapter">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <!-- TOC Panel -->
  <div class="toc-panel" id="toc-panel">
    <button class="toc-close" id="toc-close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h2>Contents</h2>
    <div id="toc-list"></div>
  </div>

  <!-- Search Panel -->
  <div class="search-panel" id="search-panel">
    <button class="search-panel-close" id="search-panel-close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h2>Search in Book</h2>
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="reader-search-input" placeholder="Search…" autocomplete="off">
    </div>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- Settings Panel -->
  <div class="reader-controls" id="reader-controls">
    <div class="controls-handle"></div>
    <div class="ctrl-row">
      <span class="ctrl-label">Size</span>
      <input type="range" class="ctrl-slider" id="font-size-slider" min="14" max="28" value="19" step="1">
      <span class="ctrl-value" id="font-size-val">19px</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Spacing</span>
      <input type="range" class="ctrl-slider" id="line-height-slider" min="1.4" max="2.4" value="1.85" step="0.05">
      <span class="ctrl-value" id="line-height-val">1.85</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Theme</span>
      <div class="ctrl-themes">
        <button class="ctrl-theme-btn active" data-theme="light">Light</button>
        <button class="ctrl-theme-btn" data-theme="sepia">Sepia</button>
        <button class="ctrl-theme-btn" data-theme="dark">Dark</button>
      </div>
    </div>
  </div>

  <div class="backdrop" id="backdrop"></div>
</div>

<script>
// ── STATE ──
let library = JSON.parse(localStorage.getItem('folio_library') || '[]');
let currentBook = null;
let currentChapter = 0;
let chapters = [];
let toc = [];
let currentTheme = localStorage.getItem('folio_theme') || 'light';
let readerFontSize = parseInt(localStorage.getItem('folio_fontsize') || '19');
let readerLineHeight = parseFloat(localStorage.getItem('folio_lineheight') || '1.85');

// Apply theme on load
applyTheme(currentTheme);
document.getElementById('font-size-slider').value = readerFontSize;
document.getElementById('font-size-val').textContent = readerFontSize + 'px';
document.getElementById('line-height-slider').value = readerLineHeight;
document.getElementById('line-height-val').textContent = readerLineHeight.toFixed(2);
document.documentElement.style.setProperty('--reader-font-size', readerFontSize + 'px');
document.documentElement.style.setProperty('--reader-line-height', readerLineHeight);

// ── THEME ──
function applyTheme(theme) {
  document.body.className = theme === 'light' ? '' : 'theme-' + theme;
  currentTheme = theme;
  localStorage.setItem('folio_theme', theme);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === theme));
  document.querySelectorAll('.ctrl-theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
}
document.querySelectorAll('.theme-dot').forEach(d => d.addEventListener('click', () => applyTheme(d.dataset.theme)));
document.querySelectorAll('.ctrl-theme-btn').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));

// ── LIBRARY ──
function saveLibrary() { localStorage.setItem('folio_library', JSON.stringify(library)); }

function renderLibrary(filter = '') {
  const grid = document.getElementById('book-grid');
  const empty = document.getElementById('empty-state');
  const books = filter
    ? library.filter(b => (b.title + b.author).toLowerCase().includes(filter.toLowerCase()))
    : library;

  if (!library.length) { grid.style.display = 'none'; empty.style.display = ''; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';

  grid.innerHTML = '';
  if (!books.length) {
    grid.innerHTML = '<div class="search-no-results" style="grid-column:1/-1;">No books found.</div>';
    return;
  }

  books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.dataset.id = book.id;

    const progress = book.progress || 0;
    const coverHTML = book.cover
      ? `<img class="book-cover" src="${book.cover}" alt="${book.title}" loading="lazy">`
      : `<div class="book-cover-placeholder">
          <div class="spine-title">${escHtml(book.title)}</div>
          <div class="spine-author">${escHtml(book.author || '')}</div>
         </div>`;

    card.innerHTML = `
      ${coverHTML}
      <button class="book-delete" data-id="${book.id}" title="Remove">×</button>
      <div class="book-info">
        <div class="book-title">${escHtml(book.title)}</div>
        <div class="book-author">${escHtml(book.author || 'Unknown author')}</div>
        <div class="book-progress-bar"><div class="book-progress-fill" style="width:${progress}%"></div></div>
      </div>`;

    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('book-delete')) return;
      openBook(book.id);
    });
    card.querySelector('.book-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteBook(book.id);
    });
    grid.appendChild(card);
  });
}

function deleteBook(id) {
  library = library.filter(b => b.id !== id);
  saveLibrary();
  renderLibrary();
  showToast('Book removed');
}

document.getElementById('lib-search').addEventListener('input', e => renderLibrary(e.target.value));

// ── FILE IMPORT ──
document.getElementById('add-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  for (const file of files) await importEpub(file);
  e.target.value = '';
  renderLibrary();
});

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.epub'));
  for (const file of files) await importEpub(file);
  renderLibrary();
});

async function importEpub(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(arrayBuffer);

    // Parse OPF
    const containerXml = await zip.file('META-INF/container.xml')?.async('text');
    if (!containerXml) throw new Error('Not a valid EPUB');

    const opfPath = containerXml.match(/full-path="([^"]+\.opf)"/)?.[1];
    if (!opfPath) throw new Error('OPF not found');

    const opfXml = await zip.file(opfPath)?.async('text');
    const parser = new DOMParser();
    const opfDoc = parser.parseFromString(opfXml, 'application/xml');

    const title = opfDoc.querySelector('title')?.textContent?.trim() || file.name.replace('.epub', '');
    const author = opfDoc.querySelector('creator')?.textContent?.trim() || 'Unknown';
    const id = Date.now() + Math.random().toString(36).slice(2);

    // Cover
    let cover = null;
    try {
      const coverId = opfDoc.querySelector('meta[name="cover"]')?.getAttribute('content')
        || opfDoc.querySelector('item[properties="cover-image"]')?.getAttribute('id');
      const coverHref = coverId
        ? opfDoc.querySelector(`item[id="${coverId}"]`)?.getAttribute('href')
        : null;
      if (coverHref) {
        const coverBase = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
        const coverFile = zip.file(coverBase + coverHref) || zip.file(coverHref);
        if (coverFile) {
          const coverBlob = await coverFile.async('blob');
          cover = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(coverBlob);
          });
        }
      }
    } catch {}

    // Store raw epub as base64
    const base64 = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.readAsDataURL(file);
    });

    // Check duplicate
    if (library.find(b => b.title === title && b.author === author)) {
      showToast(`"${title}" already in library`);
      return;
    }

    library.push({ id, title, author, cover, data: base64, progress: 0, chapter: 0 });
    saveLibrary();
    showToast(`Added: ${title}`);
  } catch (err) {
    console.error(err);
    showToast('Could not read EPUB file');
  }
}

// ── OPEN BOOK ──
async function openBook(id) {
  const book = library.find(b => b.id === id);
  if (!book) return;
  currentBook = book;
  chapters = [];
  toc = [];

  showLoading(true);
  try {
    const base64Data = book.data.split(',')[1];
    const binary = atob(base64Data);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const zip = await JSZip.loadAsync(bytes.buffer);

    const containerXml = await zip.file('META-INF/container.xml').async('text');
    const opfPath = containerXml.match(/full-path="([^"]+\.opf)"/)?.[1];
    const opfXml = await zip.file(opfPath).async('text');
    const parser = new DOMParser();
    const opfDoc = parser.parseFromString(opfXml, 'application/xml');
    const opfBase = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);

    // Spine
    const manifestItems = {};
    opfDoc.querySelectorAll('item').forEach(item => {
      manifestItems[item.getAttribute('id')] = {
        href: item.getAttribute('href'),
        type: item.getAttribute('media-type')
      };
    });

    const spineItems = [];
    opfDoc.querySelectorAll('itemref').forEach(ref => {
      const item = manifestItems[ref.getAttribute('idref')];
      if (item && item.type && item.type.includes('html')) spineItems.push(item.href);
    });

    // Load chapters
    for (const href of spineItems) {
      try {
        const filePath = opfBase + href;
        const f = zip.file(filePath) || zip.file(href);
        if (!f) continue;
        let html = await f.async('text');
        // Inline images
        html = await inlineImages(html, zip, opfBase + href.substring(0, href.lastIndexOf('/') + 1));
        chapters.push({ href, html });
      } catch {}
    }

    // TOC from NCX or nav
    try {
      const ncxHref = Object.values(manifestItems).find(i => i.type === 'application/x-dtbncx+xml')?.href;
      if (ncxHref) {
        const ncxXml = await zip.file(opfBase + ncxHref)?.async('text') || await zip.file(ncxHref)?.async('text');
        if (ncxXml) {
          const ncxDoc = parser.parseFromString(ncxXml, 'application/xml');
          ncxDoc.querySelectorAll('navPoint').forEach(np => {
            const label = np.querySelector('navLabel text')?.textContent?.trim();
            const src = np.querySelector('content')?.getAttribute('src')?.split('#')[0];
            const depth = [...np.parentElement.closest('navPoint') ? [1] : [], 0].length;
            if (label && src) {
              const chIdx = chapters.findIndex(c => c.href === src || c.href.endsWith('/' + src) || src.endsWith(c.href));
              toc.push({ label, chIdx: chIdx >= 0 ? chIdx : 0, depth: np.parentElement.tagName === 'navPoint' ? 2 : 1 });
            }
          });
        }
      }
    } catch {}

    // Fallback TOC from chapter headings
    if (!toc.length) {
      chapters.forEach((ch, i) => {
        const doc = parser.parseFromString(ch.html, 'text/html');
        const h = doc.querySelector('h1,h2,h3');
        if (h) toc.push({ label: h.textContent.trim() || 'Chapter ' + (i + 1), chIdx: i, depth: 1 });
        else toc.push({ label: 'Chapter ' + (i + 1), chIdx: i, depth: 1 });
      });
    }

    renderToc();
    showScreen('reader');
    document.getElementById('reader-title').textContent = book.title;
    currentChapter = book.chapter || 0;
    renderChapter(currentChapter);
    showLoading(false);
  } catch (err) {
    console.error(err);
    showLoading(false);
    showToast('Error opening book');
  }
}

async function inlineImages(html, zip, base) {
  const matches = [...html.matchAll(/src=["']([^"']+\.(png|jpg|jpeg|gif|svg|webp))["']/gi)];
  for (const m of matches) {
    try {
      const src = m[1];
      const path = src.startsWith('..') ? base + src : base + src;
      const f = zip.file(path) || zip.file(src);
      if (f) {
        const blob = await f.async('blob');
        const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
        html = html.replace(m[0], `src="${dataUrl}"`);
      }
    } catch {}
  }
  return html;
}

function renderToc() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  toc.forEach(item => {
    const el = document.createElement('div');
    el.className = 'toc-item depth-' + (item.depth || 1);
    el.textContent = item.label;
    el.addEventListener('click', () => {
      goToChapter(item.chIdx);
      closePanels();
    });
    list.appendChild(el);
  });
}

function renderChapter(idx) {
  if (!chapters[idx]) return;
  const content = document.getElementById('reader-content');
  const parser = new DOMParser();
  const doc = parser.parseFromString(chapters[idx].html, 'text/html');
  // Remove script/link tags
  doc.querySelectorAll('script,link[rel="stylesheet"]').forEach(el => el.remove());
  content.innerHTML = doc.body?.innerHTML || chapters[idx].html;
  // Fix internal links
  content.querySelectorAll('a[href]').forEach(a => { a.addEventListener('click', e => e.preventDefault()); });

  document.getElementById('reader-body').scrollTo({ top: 0 });
  updateChapterNav();
  updateProgress();

  currentBook.chapter = idx;
  saveProgress();
}

function goToChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  currentChapter = idx;
  renderChapter(idx);
}

function updateChapterNav() {
  document.getElementById('prev-ch').disabled = currentChapter <= 0;
  document.getElementById('next-ch').disabled = currentChapter >= chapters.length - 1;
  document.getElementById('chapter-info').textContent = `${currentChapter + 1} / ${chapters.length}`;
}

function updateProgress() {
  const pct = chapters.length > 1 ? Math.round((currentChapter / (chapters.length - 1)) * 100) : 100;
  document.getElementById('reading-progress').style.width = pct + '%';
  currentBook.progress = pct;
}

function saveProgress() {
  const idx = library.findIndex(b => b.id === currentBook.id);
  if (idx >= 0) { library[idx] = currentBook; saveLibrary(); }
}

// Scroll progress
document.getElementById('reader-body').addEventListener('scroll', () => {
  const el = document.getElementById('reader-body');
  const scrolled = el.scrollTop / (el.scrollHeight - el.clientHeight);
  const base = chapters.length > 1 ? currentChapter / (chapters.length - 1) : 1;
  const step = chapters.length > 1 ? 1 / (chapters.length - 1) : 1;
  const pct = Math.round((base + scrolled * step) * 100);
  document.getElementById('reading-progress').style.width = Math.min(pct, 100) + '%';
});

document.getElementById('prev-ch').addEventListener('click', () => goToChapter(currentChapter - 1));
document.getElementById('next-ch').addEventListener('click', () => goToChapter(currentChapter + 1));

// ── PANELS ──
function closePanels() {
  document.getElementById('toc-panel').classList.remove('open');
  document.getElementById('search-panel').classList.remove('open');
  document.getElementById('reader-controls').classList.remove('open');
  document.getElementById('backdrop').classList.remove('visible');
}

document.getElementById('backdrop').addEventListener('click', closePanels);

document.getElementById('toc-btn').addEventListener('click', () => {
  const open = document.getElementById('toc-panel').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('visible', open);
  document.getElementById('search-panel').classList.remove('open');
  document.getElementById('reader-controls').classList.remove('open');
});
document.getElementById('toc-close').addEventListener('click', closePanels);

document.getElementById('settings-btn').addEventListener('click', () => {
  const open = document.getElementById('reader-controls').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('visible', open);
  document.getElementById('toc-panel').classList.remove('open');
  document.getElementById('search-panel').classList.remove('open');
});

document.getElementById('reader-search-btn').addEventListener('click', () => {
  const open = document.getElementById('search-panel').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('visible', open);
  document.getElementById('toc-panel').classList.remove('open');
  document.getElementById('reader-controls').classList.remove('open');
  if (open) setTimeout(() => document.getElementById('reader-search-input').focus(), 300);
});
document.getElementById('search-panel-close').addEventListener('click', closePanels);

// ── SEARCH ──
let searchDebounce;
document.getElementById('reader-search-input').addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => doSearch(e.target.value.trim()), 300);
});

function doSearch(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 2) { results.innerHTML = ''; return; }
  const parser = new DOMParser();
  const found = [];
  chapters.forEach((ch, chIdx) => {
    const doc = parser.parseFromString(ch.html, 'text/html');
    const text = doc.body?.textContent || '';
    const re = new RegExp(escRegex(query), 'gi');
    let match;
    while ((match = re.exec(text)) !== null) {
      const start = Math.max(0, match.index - 80);
      const end = Math.min(text.length, match.index + query.length + 80);
      let snippet = text.slice(start, end).replace(/\s+/g, ' ');
      const hiRe = new RegExp(escRegex(query), 'gi');
      snippet = snippet.replace(hiRe, m => `<mark>${escHtml(m)}</mark>`);
      const chapLabel = toc.find(t => t.chIdx === chIdx)?.label || `Chapter ${chIdx + 1}`;
      found.push({ chIdx, snippet, chapLabel });
      if (found.length >= 60) break;
    }
    if (found.length >= 60) return;
  });

  if (!found.length) { results.innerHTML = '<div class="search-no-results">No results found.</div>'; return; }
  results.innerHTML = found.map((r, i) => `
    <div class="search-result-item" data-idx="${i}">
      <div class="search-result-chapter">${escHtml(r.chapLabel)}</div>
      <div class="search-result-text">${r.snippet}</div>
    </div>`).join('');
  results.querySelectorAll('.search-result-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      goToChapter(found[i].chIdx);
      closePanels();
      document.getElementById('reader-search-input').value = '';
      results.innerHTML = '';
    });
  });
}

// ── FONT CONTROLS ──
document.getElementById('font-size-slider').addEventListener('input', (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('font-size-val').textContent = v + 'px';
  document.documentElement.style.setProperty('--reader-font-size', v + 'px');
  localStorage.setItem('folio_fontsize', v);
});
document.getElementById('line-height-slider').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value).toFixed(2);
  document.getElementById('line-height-val').textContent = v;
  document.documentElement.style.setProperty('--reader-line-height', v);
  localStorage.setItem('folio_lineheight', v);
});

// ── NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
}

document.getElementById('back-btn').addEventListener('click', () => {
  closePanels();
  saveProgress();
  showScreen('library');
  renderLibrary();
});

// ── UTILS ──
function showLoading(v) { document.getElementById('loading').classList.toggle('visible', v); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── INIT ──
renderLibrary();
</script>
</body>
</html>
